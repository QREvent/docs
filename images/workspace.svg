<svg viewBox="0 0 760 210" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Tu espacio de trabajo: Inicio, Productora y Evento">
  <defs>
    <clipPath id="w"><rect width="760" height="210" rx="18"/></clipPath>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
  </defs>
  <g clip-path="url(#w)">
    <rect width="760" height="210" fill="#0f1629"/>

    <!-- flechas -->
    <g stroke="#3b82f6" stroke-width="2.5" fill="none">
      <path d="M232 105 h36" marker-end="url(#a)"/>
      <path d="M492 105 h36" marker-end="url(#a)"/>
    </g>
    <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#3b82f6"/></marker></defs>

    <!-- Inicio -->
    <g transform="translate(28,45)">
      <rect width="200" height="120" rx="14" fill="#131c33" stroke="#2b3960"/>
      <g transform="translate(24,26)" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linejoin="round"><path d="M0 12 L12 0 L24 12"/><rect x="4" y="12" width="16" height="12" rx="2"/></g>
      <text x="64" y="42" fill="#ffffff" font-size="18" font-weight="800">Inicio</text>
      <text x="24" y="76" fill="#8aa0c6" font-size="13">Tu panel general:</text>
      <text x="24" y="95" fill="#8aa0c6" font-size="13">actividad y accesos.</text>
    </g>

    <!-- Productora -->
    <g transform="translate(288,45)">
      <rect width="200" height="120" rx="14" fill="#131c33" stroke="#2b3960"/>
      <g transform="translate(24,24)" fill="none" stroke="#a78bfa" stroke-width="2.5"><rect x="0" y="0" width="26" height="28" rx="2"/><path d="M7 8 h4 M15 8 h4 M7 16 h4 M15 16 h4" stroke-linecap="round"/></g>
      <text x="64" y="42" fill="#ffffff" font-size="18" font-weight="800">Productora</text>
      <text x="24" y="76" fill="#8aa0c6" font-size="13">Tu marca: eventos,</text>
      <text x="24" y="95" fill="#8aa0c6" font-size="13">equipo y finanzas.</text>
    </g>

    <!-- Evento -->
    <g transform="translate(548,45)">
      <rect width="200" height="120" rx="14" fill="url(#acc)"/>
      <g transform="translate(24,24)" fill="none" stroke="#ffffff" stroke-width="2.5"><rect x="0" y="2" width="28" height="26" rx="3"/><path d="M0 10 h28 M8 0 v6 M20 0 v6" stroke-linecap="round"/></g>
      <text x="64" y="42" fill="#ffffff" font-size="18" font-weight="800">Evento</text>
      <text x="24" y="76" fill="#e0e7ff" font-size="13">Entradas, plano,</text>
      <text x="24" y="95" fill="#e0e7ff" font-size="13">ventas y accesos.</text>
    </g>
  </g>
</svg>
