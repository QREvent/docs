<svg viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Passkeys: entrás con huella, cara o PIN, sin contraseña">
  <defs><clipPath id="pk"><rect width="760" height="180" rx="18"/></clipPath></defs>
  <g clip-path="url(#pk)">
    <rect width="760" height="180" fill="#0f1629"/>

    <!-- métodos del dispositivo -->
    <g transform="translate(48,40)">
      <rect width="360" height="100" rx="14" fill="#131c33" stroke="#2b3960"/>
      <text x="24" y="30" fill="#8aa0c6" font-size="13" font-weight="600">Con tu dispositivo</text>

      <!-- huella -->
      <g transform="translate(56,66)" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round">
        <path d="M-14 2 a14 14 0 0 1 28 0"/><path d="M-9 4 a9 9 0 0 1 18 0"/><path d="M-4 6 a4 4 0 0 1 8 0"/>
      </g>
      <text x="56" y="94" text-anchor="middle" fill="#cdd9f5" font-size="12">Huella</text>

      <!-- cara -->
      <g transform="translate(170,64)"><circle r="15" fill="none" stroke="#a78bfa" stroke-width="2.5"/><circle cx="-5" cy="-3" r="2" fill="#a78bfa"/><circle cx="5" cy="-3" r="2" fill="#a78bfa"/><path d="M-6 5 a6 4 0 0 0 12 0" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/></g>
      <text x="170" y="94" text-anchor="middle" fill="#cdd9f5" font-size="12">Cara</text>

      <!-- PIN -->
      <g transform="translate(284,62)" fill="#22d3ee"><circle cx="-9" cy="0" r="4"/><circle cx="0" cy="0" r="4"/><circle cx="9" cy="0" r="4"/><circle cx="18" cy="0" r="4"/></g>
      <text x="292" y="94" text-anchor="middle" fill="#cdd9f5" font-size="12">PIN</text>
    </g>

    <path d="M420 90 h44" stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#pka)"/>
    <defs><marker id="pka" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#3b82f6"/></marker></defs>

    <!-- entrás -->
    <g transform="translate(486,40)">
      <rect width="226" height="100" rx="14" fill="#0f2e1e" stroke="#16a34a"/>
      <circle cx="46" cy="50" r="22" fill="#22c55e"/>
      <path d="M36 50 l7 8 l14 -16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="80" y="46" fill="#ffffff" font-size="17" font-weight="800">Entrás</text>
      <text x="80" y="68" fill="#86efac" font-size="13">sin contraseña</text>
    </g>
  </g>
</svg>
