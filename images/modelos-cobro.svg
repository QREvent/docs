<svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Dos modelos de cobro: créditos y comisión">
  <defs><clipPath id="mc"><rect width="760" height="250" rx="18"/></clipPath></defs>
  <g clip-path="url(#mc)">
    <rect width="760" height="250" fill="#0f1629"/>

    <!-- Créditos -->
    <g transform="translate(28,26)">
      <rect width="320" height="198" rx="16" fill="#132449" stroke="#2563eb"/>
      <g transform="translate(24,26)">
        <ellipse cx="14" cy="22" rx="16" ry="6" fill="#60a5fa"/><ellipse cx="14" cy="15" rx="16" ry="6" fill="#3b82f6"/><ellipse cx="14" cy="8" rx="16" ry="6" fill="#93c5fd"/>
        <text x="46" y="18" fill="#ffffff" font-size="20" font-weight="800">Créditos</text>
      </g>
      <g fill="#cdd9f5" font-size="14">
        <circle cx="28" cy="92" r="3" fill="#60a5fa"/><text x="42" y="97">Pagás por adelantado</text>
        <circle cx="28" cy="124" r="3" fill="#60a5fa"/><text x="42" y="129">Sin comisión por venta</text>
        <circle cx="28" cy="156" r="3" fill="#60a5fa"/><text x="42" y="161">Sin conectar MercadoPago</text>
      </g>
    </g>

    <text x="380" y="132" text-anchor="middle" fill="#5b6b8f" font-size="16" font-weight="800">VS</text>

    <!-- Comisión -->
    <g transform="translate(412,26)">
      <rect width="320" height="198" rx="16" fill="#1e1640" stroke="#7c3aed"/>
      <g transform="translate(24,22)">
        <rect x="0" y="4" width="34" height="24" rx="4" fill="#a78bfa"/><rect x="0" y="10" width="34" height="6" fill="#4c1d95"/>
        <text x="48" y="22" fill="#ffffff" font-size="20" font-weight="800">Comisión</text>
      </g>
      <g fill="#e4dbfb" font-size="14">
        <circle cx="28" cy="92" r="3" fill="#a78bfa"/><text x="42" y="97">La plata va directo a tu cuenta</text>
        <circle cx="28" cy="124" r="3" fill="#a78bfa"/><text x="42" y="129">Comisión por cada venta</text>
        <circle cx="28" cy="156" r="3" fill="#a78bfa"/><text x="42" y="161">Requiere MercadoPago</text>
      </g>
    </g>
  </g>
</svg>
