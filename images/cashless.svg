<svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Cashless: cargar saldo y pagar en la barra">
  <defs><clipPath id="cl"><rect width="760" height="200" rx="18"/></clipPath></defs>
  <g clip-path="url(#cl)">
    <rect width="760" height="200" fill="#0f1629"/>
    <g stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#cla)"><path d="M240 100 h40"/><path d="M498 100 h40"/></g>
    <defs><marker id="cla" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#3b82f6"/></marker></defs>

    <!-- Cargar saldo -->
    <g transform="translate(40,55)">
      <rect width="160" height="90" rx="12" fill="#132449" stroke="#2b3960"/>
      <text x="80" y="40" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">Cargás saldo</text>
      <text x="80" y="66" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="800">con MercadoPago</text>
    </g>

    <!-- Billetera -->
    <g transform="translate(300,48)">
      <rect width="170" height="104" rx="14" fill="url(#wg)"/>
      <defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs>
      <text x="18" y="34" fill="#e0e7ff" font-size="13" font-weight="600">Tu billetera</text>
      <text x="18" y="66" fill="#ffffff" font-size="26" font-weight="800">$ 5.000</text>
      <rect x="122" y="20" width="34" height="34" rx="5" fill="#ffffff"/>
      <g transform="translate(128,26)" fill="#4c1d95"><rect width="8" height="8"/><rect x="14" width="8" height="8"/><rect y="14" width="8" height="8"/><rect x="16" y="16" width="6" height="6"/></g>
      <text x="18" y="92" fill="#dbe4ff" font-size="11">Mostrás el QR en la barra</text>
    </g>

    <!-- Pagar -->
    <g transform="translate(558,55)">
      <rect width="164" height="90" rx="12" fill="#132449" stroke="#22d3ee"/>
      <text x="82" y="38" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="600">El barman descuenta</text>
      <text x="82" y="66" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">– $ 1.200</text>
    </g>
  </g>
</svg>
