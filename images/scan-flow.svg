<svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Flujo de escaneo: QR, validación y ingreso">
  <defs><clipPath id="sf"><rect width="760" height="200" rx="18"/></clipPath></defs>
  <g clip-path="url(#sf)">
    <rect width="760" height="200" fill="#0f1629"/>
    <g stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#sfa)"><path d="M232 100 h44"/><path d="M498 100 h44"/></g>
    <defs><marker id="sfa" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#3b82f6"/></marker></defs>

    <!-- QR entrada -->
    <g transform="translate(48,55)">
      <rect width="150" height="90" rx="12" fill="#132449" stroke="#2b3960"/>
      <rect x="18" y="18" width="54" height="54" rx="6" fill="#eef2ff"/>
      <g transform="translate(28,28)" fill="#0f172a"><rect width="12" height="12"/><rect x="22" width="12" height="12"/><rect y="22" width="12" height="12"/><rect x="26" y="26" width="8" height="8"/><rect x="16" y="6" width="6" height="6"/></g>
      <text x="88" y="46" fill="#cdd9f5" font-size="14" font-weight="700">Entrada</text>
      <text x="88" y="66" fill="#8aa0c6" font-size="12">con QR</text>
    </g>

    <!-- Celular escaneando -->
    <g transform="translate(300,42)">
      <rect width="160" height="116" rx="14" fill="#1e293b" stroke="#3b4a6b"/>
      <rect x="50" y="24" width="60" height="60" rx="8" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
      <path d="M50 24 v-8 M50 84 v8 M110 24 v-8 M110 84 v8" stroke="#22d3ee" stroke-width="2.5"/>
      <line x1="46" y1="54" x2="114" y2="54" stroke="#22d3ee" stroke-width="2" opacity="0.7"/>
      <text x="80" y="106" text-anchor="middle" fill="#93b4f7" font-size="12" font-weight="600">Escaneás con el celu</text>
    </g>

    <!-- Validado -->
    <g transform="translate(560,55)">
      <rect width="160" height="90" rx="12" fill="#0f2e1e" stroke="#16a34a"/>
      <circle cx="40" cy="45" r="22" fill="#22c55e"/>
      <path d="M30 45 l7 8 l14 -16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="74" y="40" fill="#ffffff" font-size="15" font-weight="800">Ingreso OK</text>
      <text x="74" y="60" fill="#86efac" font-size="12">1 vez por fecha</text>
    </g>
  </g>
</svg>
