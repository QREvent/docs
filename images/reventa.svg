<svg viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Reventa: QR congelado mientras está publicada y QR nuevo al comprador">
  <defs><clipPath id="rv"><rect width="760" height="220" rx="18"/></clipPath></defs>
  <g clip-path="url(#rv)">
    <rect width="760" height="220" fill="#0f1629"/>

    <!-- badge -->
    <g transform="translate(280,20)">
      <rect width="200" height="30" rx="15" fill="#78350f"/>
      <circle cx="20" cy="15" r="5" fill="#f59e0b"/>
      <text x="34" y="20" fill="#fde68a" font-size="13" font-weight="700">precio ≤ valor original</text>
    </g>

    <!-- Publicada / congelada -->
    <g transform="translate(56,78)">
      <rect width="200" height="110" rx="14" fill="#132449" stroke="#38bdf8"/>
      <rect x="20" y="22" width="60" height="60" rx="8" fill="#dbeafe" opacity="0.5"/>
      <g transform="translate(30,32)" fill="#334155" opacity="0.6"><rect width="12" height="12"/><rect x="22" width="12" height="12"/><rect y="22" width="12" height="12"/><rect x="26" y="26" width="8" height="8"/></g>
      <g transform="translate(38,40)"><circle r="16" fill="#0f1629" opacity="0.55"/><rect x="-8" y="-2" width="16" height="12" rx="2" fill="#7dd3fc"/><path d="M-5 -2 v-4 a5 5 0 0 1 10 0 v4" fill="none" stroke="#7dd3fc" stroke-width="2.5"/></g>
      <text x="100" y="52" fill="#ffffff" font-size="14" font-weight="800">Publicada</text>
      <text x="100" y="72" fill="#7dd3fc" font-size="12">QR congelado</text>
    </g>

    <g transform="translate(276,133)"><path d="M0 0 h48" stroke="#22c55e" stroke-width="2.5" marker-end="url(#rva)"/><text x="24" y="-10" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">se vende</text></g>
    <defs><marker id="rva" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#22c55e"/></marker></defs>

    <!-- Comprador nuevo -->
    <g transform="translate(348,78)">
      <rect width="200" height="110" rx="14" fill="#0f2e1e" stroke="#16a34a"/>
      <rect x="20" y="22" width="60" height="60" rx="8" fill="#eef2ff"/>
      <g transform="translate(30,32)" fill="#0f172a"><rect width="12" height="12"/><rect x="22" width="12" height="12"/><rect y="22" width="12" height="12"/><rect x="26" y="26" width="8" height="8"/><rect x="16" y="6" width="6" height="6"/></g>
      <text x="100" y="46" fill="#ffffff" font-size="14" font-weight="800">Comprador</text>
      <text x="100" y="64" fill="#ffffff" font-size="14" font-weight="800">nuevo</text>
      <text x="100" y="84" fill="#86efac" font-size="12">QR nuevo, válido</text>
    </g>

    <!-- devolución -->
    <g transform="translate(590,78)">
      <rect width="132" height="110" rx="14" fill="#131c33" stroke="#2b3960"/>
      <text x="16" y="34" fill="#dbe4ff" font-size="13" font-weight="700">¿Agotado?</text>
      <text x="16" y="58" fill="#8aa0c6" font-size="12">Lista de espera:</text>
      <text x="16" y="76" fill="#8aa0c6" font-size="12">si alguien devuelve,</text>
      <text x="16" y="94" fill="#8aa0c6" font-size="12">te lo ofrecen 1º.</text>
    </g>
  </g>
</svg>
