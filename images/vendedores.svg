<svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Vendedores: link de referido, métricas y comisión">
  <defs><clipPath id="vd"><rect width="760" height="200" rx="18"/></clipPath></defs>
  <g clip-path="url(#vd)">
    <rect width="760" height="200" fill="#0f1629"/>
    <g stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#vda)"><path d="M226 100 h34"/><path d="M540 100 h34"/></g>
    <defs><marker id="vda" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#3b82f6"/></marker></defs>

    <!-- link -->
    <g transform="translate(36,66)">
      <rect width="180" height="68" rx="14" fill="#132449" stroke="#2b3960"/>
      <g transform="translate(22,34)" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"><path d="M-6 4 l8 -8 M-2 8 a7 7 0 0 1 0 -10 l3 -3 M2 -8 a7 7 0 0 1 0 10 l-3 3"/></g>
      <text x="44" y="30" fill="#cdd9f5" font-size="13" font-weight="700">Link de Juan</text>
      <text x="44" y="48" fill="#8aa0c6" font-size="11">?ref=juan</text>
    </g>

    <!-- métricas -->
    <g transform="translate(272,52)">
      <g><rect width="80" height="96" rx="12" fill="#131c33" stroke="#2b3960"/><text x="40" y="40" text-anchor="middle" fill="#60a5fa" font-size="22" font-weight="800">320</text><text x="40" y="64" text-anchor="middle" fill="#8aa0c6" font-size="12">clicks</text></g>
      <g transform="translate(94,0)"><rect width="80" height="96" rx="12" fill="#131c33" stroke="#2b3960"/><text x="40" y="40" text-anchor="middle" fill="#22d3ee" font-size="22" font-weight="800">45</text><text x="40" y="64" text-anchor="middle" fill="#8aa0c6" font-size="12">ventas</text></g>
      <g transform="translate(188,0)"><rect width="88" height="96" rx="12" fill="#131c33" stroke="#2b3960"/><text x="44" y="40" text-anchor="middle" fill="#a78bfa" font-size="18" font-weight="800">$540k</text><text x="44" y="64" text-anchor="middle" fill="#8aa0c6" font-size="12">ingresos</text></g>
    </g>

    <!-- comisión -->
    <g transform="translate(586,60)">
      <rect width="140" height="80" rx="14" fill="#1e1640" stroke="#7c3aed"/>
      <text x="70" y="34" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">Comisión</text>
      <text x="70" y="58" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="800">a Juan</text>
    </g>
  </g>
</svg>
