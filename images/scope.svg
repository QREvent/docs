<svg viewBox="0 0 760 210" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Cobertura de fechas de un tipo de entrada: una, todas o algunas">
  <defs><clipPath id="sc"><rect width="760" height="210" rx="18"/></clipPath></defs>
  <g clip-path="url(#sc)">
    <rect width="760" height="210" fill="#0f1629"/>
    <text x="32" y="36" fill="#8aa0c6" font-size="13" font-weight="600">¿A qué fechas da acceso cada tipo de entrada?</text>

    <!-- Una fecha -->
    <g transform="translate(32,54)">
      <rect width="220" height="128" rx="14" fill="#131c33" stroke="#2b3960"/>
      <rect x="20" y="20" width="40" height="28" rx="5" fill="#3b82f6"/>
      <text x="72" y="40" fill="#ffffff" font-size="16" font-weight="800">Una fecha</text>
      <g transform="translate(20,74)">
        <g><circle cx="16" cy="14" r="15" fill="#2563eb"/><text x="16" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">V</text></g>
        <g opacity="0.35"><circle cx="60" cy="14" r="15" fill="none" stroke="#64748b" stroke-width="2"/><text x="60" y="19" text-anchor="middle" fill="#64748b" font-size="12">S</text></g>
        <g opacity="0.35"><circle cx="104" cy="14" r="15" fill="none" stroke="#64748b" stroke-width="2"/><text x="104" y="19" text-anchor="middle" fill="#64748b" font-size="12">D</text></g>
      </g>
    </g>

    <!-- Todas -->
    <g transform="translate(270,54)">
      <rect width="220" height="128" rx="14" fill="#132449" stroke="#22d3ee"/>
      <rect x="20" y="20" width="40" height="28" rx="5" fill="#22d3ee"/>
      <text x="72" y="40" fill="#ffffff" font-size="16" font-weight="800">Todas</text>
      <g transform="translate(20,74)" fill="#06b6d4">
        <g><circle cx="16" cy="14" r="15"/><text x="16" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">V</text></g>
        <g><circle cx="60" cy="14" r="15"/><text x="60" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">S</text></g>
        <g><circle cx="104" cy="14" r="15"/><text x="104" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">D</text></g>
      </g>
      <text x="150" y="92" fill="#67e8f9" font-size="12">abono</text>
    </g>

    <!-- Algunas -->
    <g transform="translate(508,54)">
      <rect width="220" height="128" rx="14" fill="#1e1640" stroke="#7c3aed"/>
      <rect x="20" y="20" width="40" height="28" rx="5" fill="#7c3aed"/>
      <text x="72" y="40" fill="#ffffff" font-size="16" font-weight="800">Algunas</text>
      <g transform="translate(20,74)">
        <g fill="#7c3aed"><circle cx="16" cy="14" r="15"/><text x="16" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">V</text></g>
        <g fill="#7c3aed"><circle cx="60" cy="14" r="15"/><text x="60" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">S</text></g>
        <g opacity="0.35"><circle cx="104" cy="14" r="15" fill="none" stroke="#64748b" stroke-width="2"/><text x="104" y="19" text-anchor="middle" fill="#64748b" font-size="12">D</text></g>
      </g>
    </g>
  </g>
</svg>
