<svg viewBox="0 0 760 210" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Estado y visibilidad: dos interruptores independientes">
  <defs><clipPath id="ev"><rect width="760" height="210" rx="18"/></clipPath></defs>
  <g clip-path="url(#ev)">
    <rect width="760" height="210" fill="#0f1629"/>

    <!-- Estado -->
    <g transform="translate(60,44)">
      <text fill="#8aa0c6" font-size="13" font-weight="600">ESTADO</text>
      <g transform="translate(0,16)">
        <rect width="60" height="32" rx="16" fill="#2563eb"/>
        <circle cx="44" cy="16" r="12" fill="#ffffff"/>
      </g>
      <text x="80" y="30" fill="#ffffff" font-size="18" font-weight="800">Activo</text>
      <text x="80" y="52" fill="#93b4f7" font-size="14">está vendiendo</text>
    </g>

    <!-- Visibilidad -->
    <g transform="translate(60,120)">
      <text fill="#8aa0c6" font-size="13" font-weight="600">VISIBILIDAD</text>
      <g transform="translate(0,16)">
        <rect width="60" height="32" rx="16" fill="#7c3aed"/>
        <circle cx="44" cy="16" r="12" fill="#ffffff"/>
      </g>
      <text x="80" y="30" fill="#ffffff" font-size="18" font-weight="800">Público</text>
      <text x="80" y="52" fill="#c4b5fd" font-size="14">aparece en la cartelera</text>
    </g>

    <!-- Nota -->
    <g transform="translate(430,64)">
      <rect width="270" height="82" rx="14" fill="#131c33" stroke="#2b3960"/>
      <text x="20" y="34" fill="#dbe4ff" font-size="14" font-weight="700">Son independientes</text>
      <text x="20" y="58" fill="#8aa0c6" font-size="13">Podés estar activo pero oculto</text>
      <text x="20" y="76" fill="#8aa0c6" font-size="13">(vendés solo por link), o al revés.</text>
    </g>
  </g>
</svg>
