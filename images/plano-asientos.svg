<svg viewBox="0 0 660 210" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Estados de un asiento: disponible, seleccionado y agotado">
  <defs>
    <clipPath id="rr"><rect width="660" height="210" rx="18"/></clipPath>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#475569"/><line x1="0" y1="0" x2="0" y2="8" stroke="#64748b" stroke-width="3"/>
    </pattern>
  </defs>
  <g clip-path="url(#rr)">
    <rect width="660" height="210" fill="#0f1629"/>

    <!-- Disponible -->
    <g transform="translate(110,84)">
      <circle r="30" fill="#34d399"/>
      <text y="66" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">Disponible</text>
      <text y="88" text-anchor="middle" fill="#8aa0c6" font-size="13">se puede comprar</text>
    </g>

    <!-- Seleccionado -->
    <g transform="translate(330,84)">
      <circle r="34" fill="none" stroke="#ffffff" stroke-width="3"/>
      <circle r="30" fill="#3b82f6"/>
      <path d="M-11 1 l7 8 l15 -17" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="66" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">Seleccionado</text>
      <text y="88" text-anchor="middle" fill="#8aa0c6" font-size="13">el que estás eligiendo</text>
    </g>

    <!-- Agotado -->
    <g transform="translate(550,84)">
      <circle r="30" fill="url(#hatch)"/>
      <text y="66" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">Agotado</text>
      <text y="88" text-anchor="middle" fill="#8aa0c6" font-size="13">ya vendido</text>
    </g>
  </g>
</svg>
